# Paths excluded from GitHub secret scanning.
# These contain synthetic secret-detection test fixtures inherited from upstream
# warpdotdev/warp (e.g. Stripe's documentation example key sk_live_4eC39...),
# not real credentials.
paths-ignore:
  - "**/secrets_tests.rs"
  - "**/secret_redaction_tests.rs"
  - "**/*_redaction_tests.rs"
  - "**/data/cloud_objects.sqlite"
